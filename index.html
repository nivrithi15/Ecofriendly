<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arca</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>

    <header>
        <h1>Arca</h1>
        <p>Digitalize your wardrobe. Prevent fashion waste.</p>
    </header>

    <main>
        <div class="total-impact">
            <h2>Total Closet Impact</h2>
            <div class="stat-circle">
                <span id="total-co2">0.0</span>
                <small>kg</small>
            </div>
            <p style="color: #636e72; font-size: 0.85rem; margin-top: 10px;">
                CO₂ emissions prevented by shopping your closet.
            </p>
        </div>

        <div class="controls">
            <button id="upload_widget" class="cloudinary-button">Add New Item</button>
        </div>
        <div class="folder-navigation">
            <button class="folder-btn active" onclick="filterFolder('all')">All</button>
            <button class="folder-btn" onclick="filterFolder('dresses')">Dresses</button>
            <button class="folder-btn" onclick="filterFolder('casuals')">Casuals</button>
            <button class="folder-btn" onclick="filterFolder('home')">Home Wear</button>
        </div>
        <div id="wardrobe-grid" class="grid">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
